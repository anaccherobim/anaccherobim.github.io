<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: url('img/FundoE.png') top center / cover no-repeat fixed;
            color: #333;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(15, 50px);
            gap: 5px;
            justify-content: center;
            margin: 10px auto;
        }

        .number {
            width: 50px;
            height: 50px;
            background: #fff;
            border: 1px solid #ccc;
            color: #d8d8d8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .marked {
            background: #021cad;
            color: white;
            text-shadow: -1px -1px 0 black, 1px -1px 0 black, -1px 1px 0 black, 1px 1px 0 black;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* modal do número sorteado */
        .number-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 28, 173, 0.92);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
        }

        .number-modal-label {
            font-size: 36px;
            font-weight: bold;
            color: white;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-shadow: -2px -2px 0 black, 2px -2px 0 black, -2px 2px 0 black, 2px 2px 0 black;
        }

        .number-modal-value {
            font-size: 260px;
            font-weight: bold;
            color: white;
            line-height: 1;
            text-shadow: -4px -4px 0 black, 4px -4px 0 black, -4px 4px 0 black, 4px 4px 0 black;
        }

        .number-modal-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 8px;
            background: white;
            width: 100%;
            transform-origin: left;
            animation: none;
        }

        @keyframes shrinkBar {
            from { transform: scaleX(1); }
            to   { transform: scaleX(0); }
        }

        body.dark .number-modal-overlay {
            background: rgba(80, 40, 0, 0.93);
        }

        input {
            padding: 6px;
            font-size: 16px;
            width: 80px;
            text-align: center;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 6px 14px;
            font-size: 14px;
            border: none;
            border-radius: 10px;
            background: #919191;
            color: white;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #021cad;
        }

        .theme-toggle {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #ddd;
            border: none;
            padding: 4px 10px;
            font-size: 15px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 1;
        }

        .fab {
            position: fixed;
            bottom: 15px;
            right: 15px;
            width: 50px;
            height: 50px;
            background: #919191;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        .fab-menu {
            position: fixed;
            bottom: 75px;
            right: 15px;
            display: none;
            flex-direction: column;
            gap: 10px;
            z-index: 1;
        }

        .fab-menu button {
            background: #919191;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            text-align: center;
        }

        .fab-menu button:hover {
            background: #021cad;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 28, 173, 0.92);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9998;
            cursor: pointer;
        }

        .modal {
            background: transparent;
            text-align: center;
            font-size: 100px;
            font-weight: bold;
            color: white;
            letter-spacing: 6px;
            position: relative;
            padding: 0 40px;
            text-shadow: -4px -4px 0 black, 4px -4px 0 black, -4px 4px 0 black, 4px 4px 0 black;
        }

        .close-modal {
            position: fixed;
            top: 20px;
            right: 28px;
            font-size: 50px;
            cursor: pointer;
            color: white;
            line-height: 1;
            text-shadow: -2px -2px 0 black, 2px -2px 0 black, -2px 2px 0 black, 2px 2px 0 black;
        }

        .modal img {
            max-width: 90vw;
            max-height: 80vh;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 16px;
        }

        body.dark {
            background: url('img/FundoE.png') top center / cover no-repeat fixed;
            color: #eee;
        }

        body.dark .big-display {
            color: #ff8c00;
        }

        body.dark .number {
            background: #d0d0d0;
            border-color: #aaa;
            color: #fff;
        }

        body.dark .marked {
            background: #ff8c00;
            color: black;
            text-shadow: -1px -1px 0 white, 1px -1px 0 white, -1px 1px 0 white, 1px 1px 0 white;
        }
        

        body.dark button {
            background: #444;
            color: #fff;
        }

        body.dark button:hover {
            background: #ff8c00;
        }

        body.dark .fab {
            background: #444;
            color: #fff;
        }

        body.dark .fab-menu button {
            background: #333;
        }

        body.dark .modal-overlay {
            background: rgba(80, 40, 0, 0.93);
        }

        .modal img {
            border-radius: 10px;
        }
   
        @media (max-width: 768px) {
            .big-display {
                font-size: 100px;
            }

            input {
                width: 60px;
                font-size: 14px;
            }

            .grid {
                grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .big-display {
                font-size: 80px;
            }

            .fab {
                width: 45px;
                height: 45px;
                font-size: 22px;
            }

            .grid {
                gap: 5px;
                justify-content: center;
            }

            .number {
                display: flex;
                align-items: center;
                justify-content: center;

            }
        }
    </style>
</head>

<body>

    <button class="theme-toggle" onclick="alternarTema()">🌗</button>

    <!-- Modal número sorteado -->
    <div class="number-modal-overlay" id="numberModal" onclick="fecharModalNumero()">
        <div class="number-modal-label">NÚMERO SORTEADO</div>
        <div class="number-modal-value" id="numberModalValue">--</div>
        <div class="number-modal-bar" id="numberModalBar"></div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="controls">
        <input type="number" id="numero" min="1" max="75" placeholder="nº">
        <button onclick="marcarNumero()">Marcar</button>
        <button onclick="limparTudo()">Limpar</button>
    </div>

    <div class="fab" onclick="toggleMenu()">+</div>

    <div class="fab-menu" id="fabMenu">
        <button onclick="abrirModal('PRÓXIMA RODADA')">Próxima Rodada</button>
        <button onclick="abrirModal('CARTELA CHEIA')">Cartela Cheia</button>
        <button onclick="abrirModal('IMG', 'img/formas-de-bingo.png')">Forma de bater</button>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="fecharModalOverlay(event)">
        <div class="modal">
            <span class="close-modal" onclick="fecharModal()">×</span>
            <div id="modalMessage"></div>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const input = document.getElementById('numero');
        const body = document.body;
        const modalOverlay = document.getElementById('modalOverlay');
        const modalMessage = document.getElementById('modalMessage');
        const fabMenu = document.getElementById('fabMenu');
        const numberModal = document.getElementById('numberModal');
        const numberModalValue = document.getElementById('numberModalValue');
        const numberModalBar = document.getElementById('numberModalBar');
        let lastNumbers = [];
        let numberModalTimer = null;

        for (let i = 1; i <= 75; i++) {
            const cell = document.createElement('div');
            cell.className = 'number';
            cell.textContent = i;
            cell.addEventListener('click', () => toggleNumero(cell));
            grid.appendChild(cell);
        }

        function fecharModalNumero() {
            if (numberModalTimer) clearTimeout(numberModalTimer);
            numberModal.style.display = 'none';
        }

        function mostrarModalNumero(num) {
            numberModalValue.textContent = num;
            numberModal.style.display = 'flex';

            // reinicia a barra de progresso
            numberModalBar.style.animation = 'none';
            numberModalBar.offsetHeight; // reflow forçado
            numberModalBar.style.animation = 'shrinkBar 3s linear forwards';

            if (numberModalTimer) clearTimeout(numberModalTimer);
            numberModalTimer = setTimeout(() => {
                numberModal.style.display = 'none';
            }, 3000);
        }

        function marcarNumero() {
            const numero = parseInt(input.value);
            if (numero >= 1 && numero <= 75) {
                document.querySelectorAll('.number').forEach(cell => {
                    if (parseInt(cell.textContent) === numero) {
                        cell.classList.add('marked');
                    }
                });
                updateHistory(numero);
                mostrarModalNumero(numero);
                input.value = '';
                input.focus();
            } else {
                alert('Digite um número entre 1 e 75');
            }
        }

        function limparTudo() {
            input.value = '';
            lastNumbers = [];
            numberModal.style.display = 'none';
            document.querySelectorAll('.number').forEach(cell => cell.classList.remove('marked'));
        }

        function toggleNumero(cell) {
            cell.classList.toggle('marked');
            if (cell.classList.contains('marked')) {
                updateHistory(parseInt(cell.textContent));
                mostrarModalNumero(cell.textContent);
            }
        }

        function updateHistory(num) {
            lastNumbers.unshift(num);
            if (lastNumbers.length > 3) {
                lastNumbers.pop();
            }
        }

        input.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                marcarNumero();
            }
        });

        function alternarTema() {
            body.classList.toggle('dark');
        }

        function toggleMenu() {
            fabMenu.style.display = fabMenu.style.display === 'flex' ? 'none' : 'flex';
        }

        function abrirModal(tipo, conteudo) {
            modalOverlay.style.display = 'flex';
            fabMenu.style.display = 'none';
            modalMessage.innerHTML = '';

            if (conteudo) {
                const img = document.createElement('img');
                img.src = conteudo;
                modalMessage.appendChild(img);
            } else {
                modalMessage.textContent = tipo;
            }
        }

        function fecharModal() {
            modalOverlay.style.display = 'none';
        }

        function fecharModalOverlay(e) {
            if (e.target === modalOverlay) fecharModal();
        }

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) fecharModal();
        });
    </script>

</body>

</html>
